name: Queue Processor Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger queue processor endpoint
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.QUEUE_PROCESS_ENDPOINT }}" \
            -H "x-scheduler-token: ${{ secrets.RESERVATION_SCHEDULER_TOKEN }}"
